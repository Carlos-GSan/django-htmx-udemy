<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django & HTMX</title>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js" integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V" crossorigin="anonymous"></script>


</head>
<body>

    <h1>Hello World!</h1>
    
    <div id="site-text" hx-boost="true">
        <p>{% lorem 2 %}</p>

        <a href="{% url 'about' %}"

            hx-target="#site-text"
            hx-swap="innerHTML transition:true"
            style="text-decoration: underline; color: blue; cursor: pointer;">About Us</a>
    </div>

    <hr/>

    <h3>Our products</h3>
    <table id="product-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>101</td>
                <td>Product A</td>
            </tr>
            <tr>
                <td>102</td>
                <td>Product B</td>
            </tr>
            <tr>
                <td>103</td>
                <td>Product C</td>
            </tr>
        </tbody>
    </table>
    
    <button class="btn" 
        hx-get="{% url 'products' %}"
        hx-target="#product-table > tbody"
        hx-swap="innerHTML transition:true">Get more</button>

        <form style="margin-top: 24px" 
            hx-post="{% url 'index' %}"
            hx-target="#product-table > tbody"
            hx-swap="beforeend transition:true"
            hx-on::after-request="document.getElementById('product').value = ''">

            {% csrf_token %}
            <label for="product">Product</label>
            <input id="product" type="text" name="product">

            <input type="submit" value="submit">
        </form>
</body>
</html>
